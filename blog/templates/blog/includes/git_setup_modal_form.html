<!-- Git Setup Modal Form (Bootstrap 4) -->
<div id="git-setup-modal" class="modal fade" tabindex="-1" role="dialog"
     aria-labelledby="gitSetupModalLabel" aria-hidden="true">
  <div class="modal-dialog" role="document">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="gitSetupModalLabel">
          <span class="material-symbols-outlined" style="font-size:20px; vertical-align:middle;">code</span>
          {% if git_repository %}Edit{% else %}Configure{% endif %} Git Repository
        </h5>
        <button type="button" class="close" data-dismiss="modal" aria-label="Close">
          <span aria-hidden="true">&times;</span>
        </button>
      </div>
      <form id="git-setup-form" method="post"
            action="{% if git_repository %}{% url 'git-setup-update' project.pk %}{% else %}{% url 'git-setup-create' project.pk %}{% endif %}">
        {% csrf_token %}
        <div class="modal-body">

          <div class="form-group">
            <label for="repository-url">Repository URL</label>
            <input type="url" class="form-control" id="repository-url"
                   name="repository_url"
                   placeholder="Repository URL"
                   value="{% if git_repository %}{{ git_repository.repository_url }}{% endif %}"
                   required>
          </div>

          <div class="form-group">
            <label for="repository-type">Git Provider</label>
            <select class="form-control" id="repository-type" name="repository_type" required>
              <option value="github" {% if git_repository.repository_type == "github" %}selected{% endif %}>GitHub</option>
              <option value="gitlab" {% if git_repository.repository_type == "gitlab" %}selected{% endif %}>GitLab</option>
              <option value="gitea" {% if git_repository.repository_type == "gitea" %}selected{% endif %}>Gitea</option>
            </select>
          </div>

          <div class="form-group">
            <div class="form-check">
              <input type="checkbox" class="form-check-input"
                     id="is-private" name="is_private"
                     {% if git_repository.is_private %}checked{% endif %}>
              <label class="form-check-label" for="is-private">
                Private Repository
              </label>
            </div>
          </div>

          <div class="form-group{% if not git_repository.is_private %} d-none{% endif %}" id="access-token-group">
            <label for="access-token">Access Token</label>
            <input type="password" class="form-control" id="access-token"
                   name="access_token"
                   placeholder="Access token">
          </div>

          <div id="git-setup-alert" class="alert d-none" role="alert"></div>

        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-dismiss="modal">Cancel</button>
          <button type="submit" class="btn btn-primary" id="git-setup-submit-btn">
            <span id="git-setup-submit-text">Save Repository</span>
            <span id="git-setup-submit-spinner" class="spinner-border spinner-border-sm d-none"
                  role="status" aria-hidden="true"></span>
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
