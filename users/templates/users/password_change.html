{% extends "users/auth_base.html" %}
{% load crispy_forms_tags %}

{% block title_text %}Password{% endblock %}

{% block content %}
<section class="helb-auth-shell helb-auth-shell--center">
    <main class="helb-auth-card helb-auth-card--compact">
        <div class="helb-auth-card__icon">
            <span class="material-symbols-outlined">lock</span>
        </div>
        <div class="helb-auth-heading">
            <h1>Update password</h1>
            <p>Change your account password.</p>
        </div>

        <form method="POST" class="helb-auth-form helb-auth-form--stacked">
            {% csrf_token %}
            {{ form|crispy }}

            <div class="d-flex justify-content-end mt-4" style="gap:0.75rem;">
                <a href="{% url 'profile' %}" class="btn btn-outline-secondary">Cancel</a>
                <button class="btn btn-primary" type="submit">
                    Save
                </button>
            </div>
        </form>
    </main>
</section>
{% endblock content %}
