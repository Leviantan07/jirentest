{% extends "blog/base.html" %}
{% load crispy_forms_tags %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="helb-card">
            <div style="text-align:center; margin-bottom:1.5rem;">
                <span class="material-symbols-outlined" style="font-size:48px; color:var(--helb-on-primary-container);">lock</span>
                <h3 style="font-weight:800;">Change Password</h3>
            </div>
            <form method="POST">
                {% csrf_token %}
                {{ form|crispy }}
                <div class="d-flex justify-content-end mt-3" style="gap:0.75rem;">
                    <a href="{% url 'profile' %}" class="btn btn-outline-secondary">Cancel</a>
                    <button class="btn btn-primary" type="submit">
                        <span class="material-symbols-outlined" style="font-size:16px;">save</span> Update password
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock content %}
