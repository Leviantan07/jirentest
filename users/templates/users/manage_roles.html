{% extends "blog/base.html" %}
{% block content %}
<h2 class="mb-4" style="font-weight:800;">
    <span class="material-symbols-outlined" style="font-size:28px; color:var(--helb-on-primary-container); vertical-align:-4px;">admin_panel_settings</span>
    Manage User Roles
</h2>

<div class="helb-card-sm" style="overflow-x:auto;">
    <table class="table table-sm mb-0">
        <thead>
            <tr>
                <th>Username</th>
                <th>Email</th>
                <th>Role</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody>
        {% for profile in profiles %}
        <tr>
            <td style="font-weight:600;">{{ profile.user.username }}</td>
            <td class="text-muted">{{ profile.user.email }}</td>
            <td>
                <span class="badge badge-{% if profile.role == 'admin' %}danger{% elif profile.role == 'contributeur' %}primary{% else %}secondary{% endif %}">
                    {{ profile.role }}
                </span>
            </td>
            <td>
                <a href="{% url 'update-role' profile.user.id %}" class="btn btn-sm btn-outline-primary">
                    <span class="material-symbols-outlined" style="font-size:14px;">edit</span> Change Role
                </a>
            </td>
        </tr>
        {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
