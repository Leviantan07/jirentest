{% extends "blog/base.html" %}
{% load crispy_forms_tags %}
{% block content %}
<div class="row justify-content-center" style="min-height:60vh; align-items:center;">
    <div class="col-md-6 col-lg-5">
        <div class="helb-card">
            <div style="text-align:center; margin-bottom:1.5rem;">
                <span class="material-symbols-outlined" style="font-size:48px; color:var(--helb-on-primary-container);">person_add</span>
                <h3 style="font-weight:800;">Create Account</h3>
            </div>
            <form method="POST">
                {% csrf_token %}
                <input type="hidden" name="token" value="{{ token }}">
                <div class="form-group">
                    <label for="invitation-username">Username</label>
                    <input id="invitation-username" type="text" class="form-control" value="{{ invitation_username }}" readonly>
                    <small class="form-text text-muted">This username was assigned by your Super Admin and cannot be changed here.</small>
                </div>
                {{ form|crispy }}
                <button class="btn btn-primary btn-block mt-3" type="submit">
                    <span class="material-symbols-outlined" style="font-size:16px;">how_to_reg</span> Register
                </button>
            </form>
            <div style="margin-top:1.5rem; padding-top:1rem; border-top:1px solid rgba(195,198,208,0.15); text-align:center;">
                <small class="text-muted">Already have an account? <a href="{% url 'login' %}">Log In</a></small>
            </div>
        </div>
    </div>
</div>
{% endblock %}
