{% extends "blog/base.html" %}
{% load crispy_forms_tags %}
{% block content %}
<div class="content-section">
    <h3>Change role for <strong>{{ target.user.username }}</strong></h3>
    <p class="text-muted">Current role: <span class="badge badge-secondary">{{ target.role }}</span></p>
    <form method="POST">
        {% csrf_token %}
        {{ form|crispy }}
        <button type="submit" class="btn btn-primary">Save</button>
        <a href="{% url 'manage-roles' %}" class="btn btn-secondary ml-2">Cancel</a>
    </form>
</div>
{% endblock %}
